name: backend

on:
  push:
  pull_request:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-checks:
    name: build / vet / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
          check-latest: true
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      - name: test (with coverage)
        run: |
          # 自動生成物 (internal/gen) と cobra コマンド (cmd) は -coverpkg で母数から除外
          PKGS=$(go list ./... | grep -v '/internal/gen' | grep -v '/cmd' | paste -sd,)
          go test -coverprofile=coverage.out -covermode=atomic -coverpkg="$PKGS" ./...
      - name: coverage summary
        run: |
          go tool cover -func=coverage.out | tee /tmp/cov-func.txt
          {
            echo '## Coverage'
            echo
            echo '```'
            cat /tmp/cov-func.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: false
          check-latest: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: backend
