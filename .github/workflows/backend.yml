name: backend

on:
  push:
  pull_request:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-checks:
    name: build / vet / test
    runs-on: ubuntu-latest
    # 統合テスト用の MySQL。ジョブ終了とともに破棄される使い捨て。
    # MySQL 8 の既定 charset は utf8mb4 / utf8mb4_0900_ai_ci なので compose のような
    # command 上書きは不要（service container では command を指定できない）。
    services:
      mysql-test:
        image: mirror.gcr.io/mysql:8
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: nazobu_test
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - "3306:3306"
        options: >-
          --health-cmd "mysqladmin ping -h localhost -uroot -ptest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    env:
      # testdb パッケージが参照する接続先。compose の mysql-test と同じ固定クレデンシャル。
      TEST_DB_HOST: 127.0.0.1
      TEST_DB_PORT: "3306"
      TEST_DB_USER: test
      TEST_DB_PASSWORD: test
      TEST_DB_NAME: nazobu_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
          check-latest: true
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      - name: test (with coverage)
        run: |
          # 自動生成物 (internal/gen) と cobra コマンド (cmd) は -coverpkg で母数から除外
          PKGS=$(go list ./... | grep -v '/internal/gen' | grep -v '/cmd' | paste -sd,)
          go test -coverprofile=coverage.out -covermode=atomic -coverpkg="$PKGS" ./...
      - name: coverage summary
        run: |
          go tool cover -func=coverage.out | tee /tmp/cov-func.txt
          {
            echo '## Coverage'
            echo
            echo '```'
            cat /tmp/cov-func.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: false
          check-latest: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: backend
