version: v2
inputs:
  - directory: proto
plugins:
  # Go の message 型
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: backend/internal/gen
    opt:
      - paths=source_relative
  # Connect-Go の service 型
  - remote: buf.build/connectrpc/go:v1.20.0
    out: backend/internal/gen
    opt:
      - paths=source_relative
  # TypeScript の message + service schema
  - remote: buf.build/bufbuild/es:v2.12.0
    out: frontend/app/gen
    opt:
      - target=ts
      - import_extension=none
