services:
  mysql:
    image: mirror.gcr.io/mysql:8
    command: >-
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  # 統合テスト専用の MySQL。volume を持たない tmpfs 起動で、コンテナを落とせばデータごと消える。
  # 通常の `docker compose up` では起動しない（--profile test 指定時のみ）。
  # クレデンシャルはテスト専用の固定値で、開発 DB (mysql) とはコンテナも認証情報も別。
  mysql-test:
    image: mirror.gcr.io/mysql:8
    profiles:
      - test
    command: >-
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: nazobu_test
      MYSQL_USER: test
      MYSQL_PASSWORD: test
    tmpfs:
      - /var/lib/mysql
    networks:
      - db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ptest"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  backend:
    image: mirror.gcr.io/golang:1.26
    working_dir: /app
    command: >-
      sh -c "go install github.com/sqldef/sqldef/v3/cmd/mysqldef@v3.11.4
      && go run . migrate
      && go run . start"
    environment:
      HTTP_ADDR: ":8080"
      SCHEMA_PATH: "sql/schema.sql"
      FRONTEND_URL: "http://localhost:3000"
      COOKIE_SECURE: "false"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URL: ${DISCORD_REDIRECT_URL:-http://localhost:3000/auth/discord/callback}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      # 統合テスト用 (mysql-test)。TEST_DB_HOST が空だと統合テストは skip される
      TEST_DB_HOST: mysql-test
      TEST_DB_PORT: "3306"
      TEST_DB_USER: test
      TEST_DB_PASSWORD: test
      TEST_DB_NAME: nazobu_test
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - go_modules:/go/pkg/mod
      - go_build:/root/.cache/go-build
    networks:
      - app
      - db

  frontend:
    image: mirror.gcr.io/node:22-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    environment:
      BACKEND_URL: "http://backend:8080"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    networks:
      - edge
      - app

# tier ごとに隣接のみ接続する3分割。各 service は隣の tier だけに到達できる。
networks:
  edge:  # cloudflared ↔ frontend
  app:   # frontend ↔ backend（backend の Discord・OG 向け egress もこの net 経由）
  db:    # backend ↔ mysql。mysql は egress 不要なので internal:true で完全遮断
    internal: true

volumes:
  mysql_data:
  go_modules:
  go_build:
  frontend_node_modules:
  frontend_next_cache:
