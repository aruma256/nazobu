syntax = "proto3";

package nazobu.v1;

option go_package = "github.com/aruma256/nazobu/backend/internal/gen/nazobu/v1;nazobuv1";

// EventService は event（公演）の参照・登録・更新 RPC を提供する。
service EventService {
  // ListEvents は登録済み event を新しい順で返す。各 event には紐づく ticket を含める。
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  // GetEvent は 1 件の event を返す。詳細・編集画面の初期表示用。
  rpc GetEvent(GetEventRequest) returns (GetEventResponse);
  // CreateEvent は新規 event を 1 件登録する。
  rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse);
  // UpdateEvent は event の title / url / catchphrase / 開場・締切オフセットを更新する。admin のみ実行可能。
  rpc UpdateEvent(UpdateEventRequest) returns (UpdateEventResponse);
}

message ListEventsRequest {}

message ListEventsResponse {
  // events は created_at 降順。
  repeated Event events = 1;
}

message Event {
  string id = 1;
  string title = 2;
  string url = 3;
  // 紐づく ticket（start_at 降順）。
  repeated EventTicket tickets = 4;
  // 開場時間が開演時刻（ticket.start_at）の何分前か。任意。
  optional int32 doors_open_minutes_before = 5;
  // 入場締切が開演時刻の何分前か（これを過ぎると参加できない）。任意。
  optional int32 entry_deadline_minutes_before = 6;
  // 公演 URL から取得した OG 画像の URL（外部）。未取得 / 取得失敗時は空文字。
  string image_url = 7;
  // 想定所要時間（分）。カレンダー連携で終了時刻を算出する用途。1 以上。
  int32 expected_duration_minutes = 8;
  // 公演のキャッチコピー（手動入力）。未設定なら空文字。
  string catchphrase = 9;
}

message EventTicket {
  string id = 1;
  // 開演日時（RFC3339, JST）。表示は日付部分のみ使われることが多い。
  string start_at = 2;
  // 一人あたりの精算額（円）。
  int32 price_per_person = 3;
  // 立て替えてくれた人の表示名。
  string purchaser_name = 4;
  // 参加者の表示名（created_at 昇順）。立て替えた人も参加者として含めて構わない。
  repeated string participant_names = 5;
  // 本サービスに未登録の同行者の人数。0 以上。
  int32 unregistered_participants_count = 6;
}

message CreateEventRequest {
  string title = 1;
  string url = 2;
  // 開場時間が開演時刻の何分前か。任意。
  optional int32 doors_open_minutes_before = 3;
  // 入場締切が開演時刻の何分前か。任意。
  optional int32 entry_deadline_minutes_before = 4;
  // 想定所要時間（分）。1 以上。
  int32 expected_duration_minutes = 5;
  // キャッチコピー（任意）。未設定なら空文字。
  string catchphrase = 6;
}

message CreateEventResponse {
  Event event = 1;
}

message GetEventRequest {
  string event_id = 1;
}

message GetEventResponse {
  Event event = 1;
  // 現在ログイン中の user が編集権限を持つか（admin のみ）。
  bool can_edit = 2;
}

message UpdateEventRequest {
  string event_id = 1;
  string title = 2;
  string url = 3;
  // 開場時間が開演時刻の何分前か。任意。
  optional int32 doors_open_minutes_before = 4;
  // 入場締切が開演時刻の何分前か。任意。
  optional int32 entry_deadline_minutes_before = 5;
  // 想定所要時間（分）。1 以上。
  int32 expected_duration_minutes = 6;
  // キャッチコピー（任意）。未設定なら空文字。
  string catchphrase = 7;
}

message UpdateEventResponse {
  Event event = 1;
}
