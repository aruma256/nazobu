syntax = "proto3";

package nazobu.v1;

option go_package = "github.com/aruma256/nazobu/backend/internal/gen/nazobu/v1;nazobuv1";

// MyPageService はマイページ表示に必要な集約データを返す。
// 表示は 1 画面分のスナップショットなので、未精算 / 今後の予定 / 当月履歴を 1 RPC で束ねる。
service MyPageService {
  // GetMyPage は cookie session の user 向けにマイページの全セクションを返す。
  // 未ログインなら unauthenticated。
  rpc GetMyPage(GetMyPageRequest) returns (GetMyPageResponse);
  // ListMonthlyTickets は指定された年月の自分の参加チケット履歴を返す。
  // 履歴セクションの月切り替え用。未ログインなら unauthenticated。
  rpc ListMonthlyTickets(ListMonthlyTicketsRequest) returns (ListMonthlyTicketsResponse);
}

message GetMyPageRequest {}

message GetMyPageResponse {
  // 自分の精算が未完了の ticket（start_at 昇順）。自分が立て替えた分は含めない。
  repeated UnsettledTicket unsettled = 1;
  // 自分が参加予定で start_at が今日以降の ticket（start_at 昇順）。
  repeated UpcomingTicket upcoming = 2;
  // サーバ基準の当月に start_at がある自分の ticket（start_at 昇順）。
  repeated MonthlyTicket monthly = 3;
  // monthly セクションの基準月（サーバ基準、JST）。1〜12。
  int32 monthly_month = 4;
  // monthly セクションの基準年（サーバ基準、JST）。
  int32 monthly_year = 5;
}

message ListMonthlyTicketsRequest {
  // JST での年。
  int32 year = 1;
  // JST での月（1〜12）。
  int32 month = 2;
}

message ListMonthlyTicketsResponse {
  // 指定月に start_at がある自分の ticket（start_at 昇順）。
  repeated MonthlyTicket monthly = 1;
  int32 year = 2;
  int32 month = 3;
}

message UnsettledTicket {
  string ticket_id = 1;
  string event_title = 2;
  // 一人あたりの精算額（円）。
  int32 price_per_person = 3;
  // 立て替えてくれた人の表示名。
  string payee_name = 4;
  // 開演日時（RFC3339, JST）。
  string start_at = 5;
}

message UpcomingTicket {
  string ticket_id = 1;
  string event_title = 2;
  string event_url = 3;
  // 開演日時（RFC3339, JST）。
  string start_at = 4;
  // 同じ ticket の他の参加者の表示名（自分は除く）。created_at 昇順。
  repeated string companion_names = 5;
  // 公演 URL から取得した OG 画像の URL。未取得 / 取得失敗時は空文字。
  string event_image_url = 6;
}

message MonthlyTicket {
  string ticket_id = 1;
  string event_title = 2;
  // 開演日時（RFC3339, JST）。
  string start_at = 3;
  // 自分の精算が完了しているか。自分が立て替えた ticket は常に true 扱い。
  bool settled = 4;
}
