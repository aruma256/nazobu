syntax = "proto3";

package nazobu.v1;

option go_package = "github.com/aruma256/nazobu/backend/internal/gen/nazobu/v1;nazobuv1";

// TicketService は ticket（公演に対する 1 枚分の参加チケット）の参照・登録 RPC を提供する。
service TicketService {
  // ListTickets は登録済み ticket を start_at 降順で返す。
  rpc ListTickets(ListTicketsRequest) returns (ListTicketsResponse);
  // GetTicket は 1 件の ticket を詳細表示用の形（参加者の精算状況を含む）で返す。
  rpc GetTicket(GetTicketRequest) returns (GetTicketResponse);
  // CreateTicket は新規 ticket を 1 件登録する。参加者（割り勘元）も同時に登録する。
  rpc CreateTicket(CreateTicketRequest) returns (CreateTicketResponse);
  // CreateTicketWithEvent は event と ticket を 1 トランザクションで同時登録する。
  // 1 公演 1 チケットが主流のため、新規作成はこの統合 RPC を主動線にする。admin のみ実行可能。
  rpc CreateTicketWithEvent(CreateTicketWithEventRequest) returns (CreateTicketWithEventResponse);
  // UpdateTicket は ticket 本体（start_at / meeting_at / price_per_person / max_participants / meeting_place / purchased_by_user_id）を更新する。
  // admin もしくは立替者のみ実行可能。新しい立替者は ticket の参加者の中から選ぶ。
  rpc UpdateTicket(UpdateTicketRequest) returns (UpdateTicketResponse);
  // UpdateTicketWithEvent は ticket と紐づく event を 1 トランザクションで同時更新する。
  // admin もしくは立替者のみ実行可能（event 編集権限は立替者にも開放）。
  // 同 event に他の ticket がある場合、event の更新内容はそれら全てに波及する。
  rpc UpdateTicketWithEvent(UpdateTicketWithEventRequest) returns (UpdateTicketWithEventResponse);
  // AddTicketParticipants は ticket の参加者を 1 人以上追加する。
  // admin もしくは立替者のみ実行可能。既に存在する user_id は無視する。
  // 追加によって max_participants を超える場合は失敗する。
  rpc AddTicketParticipants(AddTicketParticipantsRequest) returns (AddTicketParticipantsResponse);
  // RemoveTicketParticipant は ticket の参加者を 1 人削除する。
  // admin もしくは立替者のみ実行可能。立替者本人は削除できない。
  rpc RemoveTicketParticipant(RemoveTicketParticipantRequest) returns (RemoveTicketParticipantResponse);
  // UpdateTicketParticipantSettlement は参加者の精算状態を切り替える。
  // admin もしくは立替者のみ実行可能。立替者本人に対しては実行不可。
  rpc UpdateTicketParticipantSettlement(UpdateTicketParticipantSettlementRequest) returns (UpdateTicketParticipantSettlementResponse);
  // CreateTicketCharge は ticket に追加精算（打ち上げ飲み会など）を 1 件登録する。
  // ticket の参加者もしくは admin が実行でき、立替者はログイン中の user で固定する。
  // 対象者は ticket の参加者から選び、負担額は対象者ごとに指定する。
  rpc CreateTicketCharge(CreateTicketChargeRequest) returns (CreateTicketChargeResponse);
  // UpdateTicketCharge は追加精算の費目名と対象者（負担額を含む）を全置換で更新する。
  // admin もしくは charge の立替者のみ実行可能。既存対象者の精算状態は金額が変わっても維持する。
  rpc UpdateTicketCharge(UpdateTicketChargeRequest) returns (UpdateTicketChargeResponse);
  // DeleteTicketCharge は追加精算を 1 件削除する（対象者の行も一緒に消える）。
  // admin もしくは charge の立替者のみ実行可能。
  rpc DeleteTicketCharge(DeleteTicketChargeRequest) returns (DeleteTicketChargeResponse);
  // UpdateTicketChargeSettlement は追加精算の対象者の精算状態を切り替える。
  // admin もしくは charge の立替者のみ実行可能。立替者本人に対しては実行不可。
  rpc UpdateTicketChargeSettlement(UpdateTicketChargeSettlementRequest) returns (UpdateTicketChargeSettlementResponse);
}

message ListTicketsRequest {}

message ListTicketsResponse {
  // tickets は start_at 降順 / id 昇順。
  repeated Ticket tickets = 1;
}

message Ticket {
  string id = 1;
  string event_id = 2;
  string event_title = 3;
  reserved 4; // 旧 attended_on (DATE 単独保持)。start_at に統合。
  // 一人あたりの精算額（円）。
  int32 price_per_person = 5;
  // 集合日時（RFC3339, JST オフセット +09:00。集合時刻が決まっていない場合は空文字）。
  string meeting_at = 6;
  // 集合場所（空文字なら未設定）。
  string meeting_place = 7;
  // 立て替えてくれた人の表示名。
  string purchaser_name = 8;
  // 参加者の表示名（created_at 昇順）。立て替えた人も参加者として含めて構わない。
  repeated string participant_names = 9;
  // 公演の URL（任意。空文字なら未設定）。
  string event_url = 10;
  // 開演日時（RFC3339, JST オフセット +09:00）。
  string start_at = 11;
  // このチケット 1 枚で参加できる最大人数。1 以上。
  int32 max_participants = 12;
  // 公演 URL から取得した OG 画像の URL。未取得 / 取得失敗時は空文字。
  string event_image_url = 13;
  // 公演の想定所要時間（分）。カレンダー連携で終了時刻を算出する用途。1 以上。
  int32 event_expected_duration_minutes = 14;
  // 公演のキャッチコピー（手動入力）。未設定なら空文字。
  string event_catchphrase = 15;
  // 開場時間が開演時刻（start_at）の何分前か。0 以上。未設定なら未指定。
  optional int32 event_doors_open_minutes_before = 16;
  // 本サービスに未登録の同行者の人数。0 以上。
  // 登録ユーザーの参加者数と合わせて max_participants の枠を消費する。
  int32 unregistered_participants_count = 17;
}

message GetTicketRequest {
  string ticket_id = 1;
}

message GetTicketResponse {
  Ticket ticket = 1;
  // ticket の参加者一覧。created_at 昇順。
  repeated TicketParticipant participants = 2;
  // 現在ログイン中の user が編集権限を持つか（admin もしくは立替者）。
  bool can_edit = 3;
  // ticket に紐づく追加精算の一覧。created_at 昇順。
  repeated TicketCharge charges = 4;
  // 現在ログイン中の user が追加精算を新規登録できるか（admin もしくは ticket の参加者）。
  bool can_add_charge = 5;
}

// TicketCharge は ticket にぶら下がる追加精算（打ち上げ飲み会など）1 件分。
message TicketCharge {
  string id = 1;
  // 費目名。例: '打ち上げ飲み会'
  string title = 2;
  // 立替者の user id。チケット購入者と別人でも構わない。
  string paid_by_user_id = 3;
  // 立替者の表示名。
  string payer_name = 4;
  // 対象者一覧（created_at 昇順）。負担額は対象者ごとに異なってよい。
  repeated TicketChargeParticipant participants = 5;
  // 現在ログイン中の user がこの charge を編集・削除・精算操作できるか（admin もしくは立替者）。
  bool can_edit = 6;
}

message TicketChargeParticipant {
  string user_id = 1;
  // 表示名。
  string name = 2;
  // この人が立替者に支払う金額（税込・円、0 以上）。
  int32 amount = 3;
  // 精算が完了しているか。立替者本人なら常に true。
  bool settled = 4;
  // charge の立替者本人かどうか。立替者は精算操作の対象外。
  bool is_payer = 5;
}

// TicketChargeParticipantInput は charge の登録・更新で対象者 1 人分を指定する。
message TicketChargeParticipantInput {
  string user_id = 1;
  // この人が立替者に支払う金額（税込・円、0 以上）。
  int32 amount = 2;
}

message TicketParticipant {
  string user_id = 1;
  // 表示名。
  string name = 2;
  // 自分の精算が完了しているか。立替者本人なら常に true。
  bool settled = 3;
  // 立替者本人かどうか。立替者は精算操作の対象外、また削除もできない。
  bool is_purchaser = 4;
}

message CreateTicketRequest {
  string event_id = 1;
  reserved 2; // 旧 attended_on。start_at に統合。
  // 一人あたりの精算額（円、0 以上）。
  int32 price_per_person = 3;
  // 集合日時（RFC3339, JST。集合時刻が決まっていない場合は空文字）。
  string meeting_at = 4;
  // 集合場所（空文字なら未設定）。
  string meeting_place = 5;
  // 参加者（割り勘元）の user id。立替者（= ログイン中の user）を含めても構わない。1 件以上。
  // 立替者は session の user で固定するため、ここでは指定しない。
  repeated string participant_user_ids = 6;
  // 開演日時（RFC3339, JST）。
  string start_at = 7;
  // このチケット 1 枚で参加できる最大人数。新規登録では必須・1 以上。
  // participant_user_ids の件数 + unregistered_participants_count 以上である必要がある。
  int32 max_participants = 8;
  // 本サービスに未登録の同行者の人数。0 以上（省略時 0）。
  int32 unregistered_participants_count = 9;
}

message CreateTicketResponse {
  Ticket ticket = 1;
}

message UpdateTicketRequest {
  string ticket_id = 1;
  reserved 2; // 旧 attended_on。start_at に統合。
  // 一人あたりの精算額（円、0 以上）。
  int32 price_per_person = 3;
  // 集合日時（RFC3339, JST。集合時刻が決まっていない場合は空文字）。
  string meeting_at = 4;
  // 集合場所（空文字なら未設定）。
  string meeting_place = 5;
  // 開演日時（RFC3339, JST）。
  string start_at = 6;
  // 立替者の user id。ticket の参加者のいずれかを指定する。
  string purchased_by_user_id = 7;
  // このチケット 1 枚で参加できる最大人数。1 以上、
  // 現在の参加者数 + unregistered_participants_count 以上である必要がある。
  int32 max_participants = 8;
  // 本サービスに未登録の同行者の人数。0 以上（省略時 0）。
  int32 unregistered_participants_count = 9;
}

message UpdateTicketResponse {
  Ticket ticket = 1;
}

message CreateTicketWithEventRequest {
  // ---- event 部 ----
  string event_title = 1;
  string event_url = 2;
  // 公演のキャッチコピー（任意）。
  string event_catchphrase = 3;
  // 開場時間が開演時刻の何分前か。任意。
  optional int32 event_doors_open_minutes_before = 4;
  // 入場締切が開演時刻の何分前か。任意。
  optional int32 event_entry_deadline_minutes_before = 5;
  // 想定所要時間（分）。1 以上。
  int32 event_expected_duration_minutes = 6;

  // ---- ticket 部 ----
  // 一人あたりの精算額（円、0 以上）。
  int32 price_per_person = 7;
  // 開演日時（RFC3339, JST）。
  string start_at = 8;
  // 集合日時（RFC3339, JST。空文字なら未設定）。
  string meeting_at = 9;
  // 集合場所（空文字なら未設定）。
  string meeting_place = 10;
  // 参加者（割り勘元）の user id。1 件以上。
  repeated string participant_user_ids = 11;
  // このチケット 1 枚で参加できる最大人数。1 以上、
  // participant_user_ids の件数 + unregistered_participants_count 以上。
  int32 max_participants = 12;
  // 本サービスに未登録の同行者の人数。0 以上（省略時 0）。
  int32 unregistered_participants_count = 13;
}

message CreateTicketWithEventResponse {
  Ticket ticket = 1;
}

message UpdateTicketWithEventRequest {
  string ticket_id = 1;

  // ---- event 部 ----
  string event_title = 2;
  string event_url = 3;
  string event_catchphrase = 4;
  optional int32 event_doors_open_minutes_before = 5;
  optional int32 event_entry_deadline_minutes_before = 6;
  int32 event_expected_duration_minutes = 7;

  // ---- ticket 部 ----
  int32 price_per_person = 8;
  string meeting_at = 9;
  string meeting_place = 10;
  string start_at = 11;
  // 立替者の user id。ticket の参加者のいずれかを指定する。
  string purchased_by_user_id = 12;
  // 1 以上、現在の参加者数 + unregistered_participants_count 以上である必要がある。
  int32 max_participants = 13;
  // 本サービスに未登録の同行者の人数。0 以上（省略時 0）。
  int32 unregistered_participants_count = 14;
}

message UpdateTicketWithEventResponse {
  Ticket ticket = 1;
}

message AddTicketParticipantsRequest {
  string ticket_id = 1;
  // 追加する参加者の user id。1 件以上。既に参加済みの user は無視する。
  repeated string user_ids = 2;
}

message AddTicketParticipantsResponse {}

message RemoveTicketParticipantRequest {
  string ticket_id = 1;
  string user_id = 2;
}

message RemoveTicketParticipantResponse {}

message UpdateTicketParticipantSettlementRequest {
  string ticket_id = 1;
  string user_id = 2;
  // true = 精算済みにする、false = 未精算に戻す。
  bool settled = 3;
}

message UpdateTicketParticipantSettlementResponse {}

message CreateTicketChargeRequest {
  string ticket_id = 1;
  // 費目名。必須。
  string title = 2;
  // 対象者と負担額。1 件以上。ticket の参加者から選ぶ。
  // 立替者（= ログイン中の user）を含めても構わない。
  repeated TicketChargeParticipantInput participants = 3;
}

message CreateTicketChargeResponse {}

message UpdateTicketChargeRequest {
  string charge_id = 1;
  // 費目名。必須。
  string title = 2;
  // 対象者と負担額の全置換。1 件以上。ticket の参加者から選ぶ。
  // 既存対象者は金額を上書き（精算状態は維持）、指定から外れた対象者は削除する。
  repeated TicketChargeParticipantInput participants = 3;
}

message UpdateTicketChargeResponse {}

message DeleteTicketChargeRequest {
  string charge_id = 1;
}

message DeleteTicketChargeResponse {}

message UpdateTicketChargeSettlementRequest {
  string charge_id = 1;
  string user_id = 2;
  // true = 精算済みにする、false = 未精算に戻す。
  bool settled = 3;
}

message UpdateTicketChargeSettlementResponse {}
